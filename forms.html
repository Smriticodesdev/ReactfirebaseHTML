<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <fieldset>
       <legend><h1>Registration Form</h1></legend>
       <form action="thanks.html">
        <table border="0" cellspacing="0" cellpadding="30" text-size="300px">
          <tbody><tr>
            <td> 
              <label for="name"> <b>Student Name: </b></label>
            </td>
            <td><input type="text" id="name" name="name" placeholder="First name" required=""></td>
            <td> <input type="text" id="middle_name" name="middle_name" placeholder="Middle name"></td>
            <td><input type="text" id="last_name" name="last_name" placeholder="Last name"></td>
          </tr>

          <tr>
            <td> <label for="Father"><b> Father's Name : </b></label></td>
            <td><input type="text" id="Father" name="Father" placeholder="Father&#39;s name" required=""></td>
            <td> <label for="Mother"> <b>Mother's Name : </b></label></td>
            <td><input type="text" id="Mother" name="Mother" placeholder="Mother&#39;s name" required=""></td>
            <td></td>
          </tr>

          <tr>
            <td><label for="date"> <b>Date of Birth : </b></label></td>
            <td><input type="date" id="date" name="date" required=""></td>
            <td>
              <label for=""> <b>Gender : </b> </label>
            </td>
            <td> <input type="radio" id="male" name="gender" value="male" required="">
                <label for="male">Male</label>
             <input type="radio" id="female" name="gender" value="female" required="">
                <label for="female">Female</label></td>
          </tr>

          <tr>
            <td><label for="category"> <b>Category : </b></label></td>
            <td> <input type="radio" id="general" name="category" value="general" required="">
                <label for="general">General</label>
             <input type="radio" id="obc" name="category" value="obc" required="">
                <label for="obc">OBC</label>
             <input type="radio" id="sc" name="category" value="sc" required="">
                <label for="sc">SC/ST </label> </td> 

                <td>
                  <label for="handicapped"> <b>Handicapped : </b></label>
                </td>
                <td><input type="radio" id="yes" name="handicapped" value="yes" required="">
                    <label for="yes">Yes</label>
                    <input type="radio" id="no" name="handicapped" value="no" required="">
                    <label for="no">No</label>
                  </td>
          </tr>

          <tr>
            <td><label for="ex-serviceman"> <b>Ex-Serviceman : </b></label></td>
            <td><input type="radio" id="Yes" name="ex-serviceman" value="yes" required="">
                <label for="Yes">Yes</label>
                <input type="radio" id="No" name="ex-serviceman" value="no" required="">
                <label for="No">No</label></td>

            <td> <label for="EWS"> <b>EWS : </b></label></td>
            <td><input type="radio" id="yEs" name="EWS" value="yes" required="">
                <label for="yEs">Yes</label>
                <input type="radio" id="nno" name="EWS" value="no" required="">
                <label for="nno">No</label></td>
          </tr>
          <tr>
            <td> <label for="e-mail"> <b>E-mail : </b></label></td>
            <td><input type="email" id="e-mail" name="e-mail" placeholder="Enter your email" required=""></td>

            <td> <label for="number"> <b>Contact Number : </b></label></td>
            <td><input type="tel" id="number" name="number" placeholder="Enter your contact number" required=""></td>
          </tr>

          <tr>
            <td> <label for="state"> <b>Choose State : </b></label></td>
            <td><select id="state" name="state" required="">
              <option value=" disabled selected">Select a state</option>
              <option value="state1">Himachal Pradesh</option>
              <option value="state2">Punjab</option>
              <option value="state3">Haryana</option>
              <option value="state4">Delhi</option>
              <option value="state5">Rajasthan</option>
              <option value="state6">Uttar Pradesh</option>
              <option value="state7">Uttarakhand</option>
              <option value="state8">Kerala</option>
              <option value="state9">Arunachal Pradesh</option>
              <option value="state10">Assam</option>

              <!-- Add more options as needed -->
            </select>
          </td>

            <td> <label for="city"> <b>City : </b></label></td>
            <td><input id="city" name="city" placeholder="Enter your city" required="">
              
              <!-- Add more options as needed -->
            </td>
          </tr>

          <tr>
            <td> <label for="file"><b> Upload Photo : </b></label></td>
            <td><input type="file" id="file" name="file" accept="image/*" required=""></td>
            <td> <label for="file"> <b>Upload Signature : </b></label></td>
            <td><input type="file" id="signature" name="signature" accept="image/*" required=""></td>
          </tr>

          <tr>
            <td style="text-align: center;" colspan="4">
              <button type="submit">Submit </button>
              <button type="reset" style="margin-left: 100px;"> Reset </button>
            </td>
          </tr>
        </tbody></table>
           
        
       </form>
      

</fieldset></body></html>
