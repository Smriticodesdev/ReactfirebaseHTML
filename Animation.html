<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .bg {
            height: 120vh;
            width: 100%;
            background-image: url(./road.jpg);
            background-size: cover;
            position: relative;
            top: 0px;
            left: 0px;
        }

        .redcar {
            height: 90px;
            width: 150px;
            background-image: url(pngwing.com.png);
            left: -150px;
            bottom: 30px;
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;

            animation: redc;
            animation-delay: 0s;
            animation-duration: 7s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;

        }

        @keyframes redc {
            0% {
                transform: translateX(1800px)
            }

            100% {
                transform: translateX(0px)
            }
        }

        .boycar {
            height: 80px;
            width: 140px;
            background-image: url(boycar.png);
            left: -150px;
            bottom: 0px;
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 2;

            animation: boycar;
            animation-delay: 2s;
            animation-duration: 7s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;

        }

        @keyframes boycar {
            0% {
                transform: translateX(0px)
            }

            100% {
                transform: translateX(1800px)
            }
        }


        .schoolbus {
            height: 200px;
            width: 300px;
            background-image: url(./schoolbus.png);
            left: -150px;
            bottom: -10px;
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 1;


            animation: school;
            animation-delay: -2s;
            animation-duration: 7s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;

        }

        @keyframes school {
            0% {
                transform: translateX(1800px)
            }

            100% {
                transform: translateX(0px)
            }
        }

        .truck {
            height: 150px;
            width: 250px;
            background-image: url(./truck.png);
            left: -150px;
            bottom: -30px;
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 3;

            animation: truck;
            animation-delay: 0s;
            animation-duration: 7s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;

        }

        @keyframes truck {
            0% {
                transform: translateX(0px) scaleX(-1)
            }

            100% {
                transform: translateX(1800px) scaleX(-1)
            }
        }

        .kids {
            height: 80px;
            width: 140px;
            background-image: url(kids.png);
            left: -150px;
            bottom: 90px;
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;

            animation: kids;
            animation-delay: 2s;
            animation-duration: 7s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;

        }

        @keyframes kids {
            0% {
                transform: translateX(1800px)
            }

            100% {
                transform: translateX(0px)
            }
        }
    </style>
</head>

<body>
    <div>
        <div class="bg"></div>
        <div class="redcar"></div>
        <div class="boycar"></div>
        <div class="schoolbus"></div>
        <div class="truck"></div>
        <div class="kids"></div>
    </div>



</body></html>
