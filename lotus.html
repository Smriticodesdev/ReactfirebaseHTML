<!DOCTYPE html>

<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lotus</title>


    <style>
        .main {
            display: flex;
            height: 600px;
            width: 600px;
            background-color: #dfcbf5;
            margin-left: 33%;
            margin-top: 5%;
            position: relative;
        }

        .p1 {
            border-radius: 5%;
            height: 156px;
            width: 140px;
            position: absolute;
            top: 112px;
            left: 45%;
            border-top-left-radius: 100%;
            border-bottom-right-radius: 100%;
            margin-left: -40px;
            transform-origin: 50% 100%;
            transform: rotate(-102deg);
            background-color: #f5a9c4;
        }

        .p2 {
            border-radius: 6%;
            height: 156px;
            width: 140px;
            position: absolute;
            top: 120px;
            left: 67%;
            border-top-left-radius: 100%;
            border-bottom-right-radius: 100%;
            margin-left: -140px;
            transform-origin: 50% 100%;
            transform: rotate(-73deg);
            background-color: #f08aae;
            z-index: 1;
        }

        .p3 {
            border-radius: 5%;
            height: 157px;
            width: 132px;
            position: absolute;
            top: 145px;
            left: 54.8%;
            border-top-left-radius: 100%;
            border-bottom-right-radius: 100%;
            margin-left: -40px;
            transform-origin: 50% 100%;
            transform: rotate(321deg);
            background-color: #e35d86;
            z-index: 2;
        }

        .p4 {
            border-radius: 5%;
            height: 156px;
            width: 132px;
            position: absolute;
            top: 20px;
            left: 50%;
            border-top-left-radius: 100%;
            border-bottom-right-radius: 100%;
            margin-left: -29px;
            transform-origin: 50% 100%;
            transform: rotate(170deg);
            background-color: #f08aae;
            z-index: 1;
        }

        .p5 {
            border-radius: 5%;
            height: 155px;
            width: 140px;
            position: absolute;
            top: 52px;
            left: 63%;
            border-top-left-radius: 100%;
            border-bottom-right-radius: 100%;
            margin-left: -35px;
            transform-origin: 50% 100%;
            transform: rotate(195deg);
            background-color: #f5a9c4;
        }

        .stem {
            width: 8px;
            height: 250px;
            position: absolute;
            background-color: green;
            top: 340px;
            left: 51%;
            margin-left: -4px;

        }

        .stem2 {
            width: 180px;
            height: 10px;
            background-color: green;
            top: 590px;
            left: 46%;
            margin-left: -60px;
            position: absolute;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            border-bottom-right-radius: 40px;
            border-bottom-left-radius: 40px;
        }

        .leaf1 {
            border-radius: 4%;
            height: 130px;
            width: 130px;
            position: absolute;
            top: 270px;
            left: 42%;
            border-top-left-radius: 100%;
            border-bottom-right-radius: 100%;
            margin-left: -18.5px;
            transform-origin: 50% 100%;
            transform: rotate(-100deg);
            background-color: green;
        }

        .leaf2 {
            border-radius: 4%;
            height: 130px;
            width: 130px;
            position: absolute;
            top: 290px;
            left: 57%;
            border-top-left-radius: 100%;
            border-bottom-right-radius: 100%;
            margin-left: -18.5px;
            transform-origin: 50% 100%;
            transform: rotate(190deg);
            background-color: green;
        }
    </style>
</head>

<body>

    <div class="main">
        <div class="p1"></div>
        <div class="p2"></div>
        <div class="p3"></div>
        <div class="p4"></div>
        <div class="p5"></div>


        <div class="stem"></div>
        <div class="stem2"></div>

        <div class="leaf1"></div>
        <div class="leaf2"></div>

    </div>


</body>

</html>
