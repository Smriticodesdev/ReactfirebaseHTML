<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylecss </title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .r1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 40px;
            border-bottom: 1px solid #e5e5e5;
        }

        .row1 a {
            color: #444;
            margin-right: 18px;
            font-size: 15px;
            text-decoration: none;
        }

        .row1 a:hover {
            color: #000;
        }

        .rowo1 {
            display: flex;
            gap: 10px;
            align-items: center;
            color: #666;
            font-size: 14px;
        }

        .rowo1 a {
            color: #666;
            text-decoration: none;
        }

        .rowo1 a:hover {
            color: #000;
        }

        .row2 {
            display: flex;
            justify-content: center;
            width: 100%;
            height: 50px;
            font-size: 70px;
            text-align: center;
            font-family: "Great Vibes", cursive;
        }

        .row3 {
            display: flex;
            gap: 40px;
            justify-content: center;
            font-size: 18px;
        }

        .rowo3 {
            color: red;
        }

        .container {
            display: flex;
            gap: 10px;
            width: 100%;
            height: 500px;
        }

        .box1,
        .box2,
        .box3,
        .box4 {
            flex: 1;
            background-size: contain;
            background-position: center;
        }

        .box1 {
            background-image: url(https://img.magnific.com/free-photo/penne-pasta-tomato-sauce-with-chicken-tomatoes-wooden-table_2829-19739.jpg?semt=ais_hybrid&w=740&q=80);
        }

        .box2 {
            background-image: url(https://scontent.fixc1-4.fna.fbcdn.net/v/t1.6435-9/109340908_1455745377967791_6693328595894293913_n.jpg?stp=dst-jpg_tt6&cstp=mx1080x1350&ctp=s640x640&_nc_cat=100&ccb=1-7&_nc_sid=833d8c&_nc_ohc=ZhvPSDLKALoQ7kNvwG73OjK&_nc_oc=Adr85RsHMju275eeSBuCZIjOx2WpJIXtf9Vss5yNPpJOeNMYHmXzqL2yvgs7v6MjTlrYcEskqlgwjh_9tSny-Z4d&_nc_zt=23&_nc_ht=scontent.fixc1-4.fna&_nc_gid=940HSB8e74-4JJLnVrA9KA&_nc_ss=7b289&oh=00_Af84Va8qEIH1CqF_baNYHINBDufv92j7e1LNlKlwihpxQw&oe=6A4E0F57);
        }

        .box3 {
            background-image: url(https://img.freepik.com/free-photo/fried-chicken-breast-cheese-tomato-french-fries-ketchup-green-salad-side-view-jpg_141793-1782.jpg?semt=ais_hybrid&w=740&q=80);
        }

        .box4 {
            background-image: url(https://images.pexels.com/photos/30546532/pexels-photo-30546532/free-photo-of-cheesy-baked-mushrooms-on-rustic-plate-in-mumbai.jpeg);
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>
    <div>
        <div class="r1">
            <div class="row1">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-globe"></i></a>
            </div>

            <div class="rowo1">
                <div> Sign in </div>
                <div> | </div>
                <div> Sign up </div>
                <div> | </div>
                <div> 🔍 </div>
            </div>
        </div>

        <div class="row2">
            <div>Yummy Blog</div>
        </div>
        <br><br><br><br><br>

        <div class="row3">
            <div class="rowo3">
                <div> Home </div>
            </div>
            <div> Pages 🔻</div>
            <div> Features</div>
            <div> Categories</div>
            <div> Archive </div>
            <div> About </div>
            <div> Contact </div>
        </div><br><br>

        <div>
            <div class="container">
                <div class="box1"> </div>
                <div class="box2"> </div>
                <div class="box3"> </div>
                <div class="box4"> </div>
            </div>
        </div>
    </div>

</body>

</html>
