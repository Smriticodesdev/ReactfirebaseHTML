<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>work</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .invoice-box {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border: 1px solid #eee;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table 
        table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        table th {
            background-color:darkseagreen;
            color: white;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"] {
            width: 95%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input[readonly] {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .total-row td {
            font-weight: bold;
            background-color: #f9f9f9;
        }

        .text-right {
            text-align: right;
        }
    </style>

   
</head>

<body>
    <table border="0" cellpadding="10px" cellspacing="0px" style="width: 100%; ">
        <tr>
            <th colspan="6"
                style=" padding: 40px 20px; font-size: 30px; font-weight: 700; letter-spacing: 30px; text-transform: uppercase; text-align: center;font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; ">
                <h1> <b>Sujata Enterprises </b> </h1>
            </th>
        </tr>
    </table>
    <table border="1px" cellpadding="10px" cellspacing="0px" style="width: 99.8%; ">
        <tr>
            <td> Bill number </td>
            <td> Date </td>
            <td> Bill Type </td>
            <td> </td>
        </tr>

        <tr>
            <td> <input type="number" placeholder="bill number"> </td>
            <td> <input type="date" placeholder="date"> </td>
            <td> <input type="text" placeholder="bill type"> </td>

        </tr>

        <tr>
            <td> Party name </td>
            <td> Quantity </td>
            <td> Rate </td>
            <td> Basic value </td>

        </tr>
        <tr>
            <td> <input type="text" placeholder="enter party name"></td>
            <td> <input type="number" id="qty" oninput="calculate()" placeholder="qty"></td>
            <td> <input type="number" id="rate" oninput="calculate()" placeholder="rate"></td>
            <td> <input type="number" id="basic" readonly placeholder="basic value"></td>
        </tr>
        <tr>
            <td colspan="3"> </td>

            <td> GST % </td>

        </tr>

        <tr>
            <td colspan="3"></td>
            <td> <input type="number" id="gst" oninput="calculate()" value="18"> </td>
        </tr>

        <tr>
            <td colspan="3"></td>
            <td> Total value </td>
        </tr>
        <tr>
            <td colspan="3"></td>
            <td> <input type="number" id="total" readonly placeholder="total"> </td>
        </tr>


    </table>

    <script>

        function calculate() {
            let qty = Number(document.getElementById("qty").value);
            let rate = Number(document.getElementById("rate").value);

            let basicValue = qty * rate;
            document.getElementById("basic").value = basicValue;

            let gst = Number(document.getElementById("gst").value);
            let totalValue = basicValue + (basicValue * gst / 100);
            document.getElementById("total").value = totalValue;
        }
    </script>


</body>

</html>
